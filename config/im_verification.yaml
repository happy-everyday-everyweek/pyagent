# PyAgent IM通道验证配置
# v0.8.1

# 验证码配置
verification:
  # 验证码长度
  code_length: 6
  # 验证码过期时间（分钟）
  expire_minutes: 10
  # 最大尝试次数
  max_attempts: 3
  # 数据库路径
  db_path: "data/im_verification.json"

# 启用的平台
enabled_platforms:
  - onebot
  - dingtalk
  - feishu
  - wecom
  - wechat
  - kimi

# 验证引导消息模板
messages:
  guide: |
    欢迎使用 PyAgent！

    为了确保账户安全，请完成身份验证。

    验证码：{code}

    请在 {expire_minutes} 分钟内回复此验证码完成验证。
    验证成功后，以后无需再次验证。

  success: "验证成功！现在可以正常使用了。"

  expired: "验证码已过期，请重新获取。"

  wrong_code: "验证码错误，还剩 {remaining} 次尝试机会。"

  too_many_attempts: "验证尝试次数过多，请重新获取验证码。"

  already_verified: "您已完成验证，可以直接使用。"

  revoked: "您的验证状态已被撤销，请重新验证。"

# 管理员配置
admin:
  # 管理员用户ID列表（可以撤销其他用户的验证）
  user_ids: []
  # 是否允许管理员跳过验证
  skip_verification: true
