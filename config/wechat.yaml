wechat:
  enabled: true
  base_url: "http://localhost:8080"
  timeout: 30
  poll_interval: 30

  accounts:
    - account_id: "default"
      nickname: "默认账号"
      context_isolation: true

  message:
    max_retry: 3
    retry_delay: 1.0

  cdn:
    max_file_size: 104857600
    allowed_types:
      - image/jpeg
      - image/png
      - image/gif
      - video/mp4
      - audio/mp3
      - audio/amr
      - application/pdf
      - application/zip
